<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="2000" height="1000" viewBox="0 0 2000 1000"
     xmlns="http://www.w3.org/2000/svg">

    <!-- ===== DEFINITIONS ===== -->
    <defs>
        <style>
            .title {
                font-family: "Times New Roman", "Cinzel", "Bodoni MT", serif;
                font-size: 260px;
                fill: #FFFFFF;
                letter-spacing: 12px;
            }
            .subtitle {
                font-family: "Times New Roman", "Cinzel", serif;
                font-size: 70px;
                fill: #FFFFFF;
                letter-spacing: 5px;
            }
        </style>
    </defs>

    <!-- ===== LAYER: BACKGROUND ===== -->
    <g id="Layer_Background">
        <rect x="0" y="0" width="2000" height="1000" fill="#000000"/>
    </g>

    <!-- ===== LAYER: MAIN LOGO TEXT ===== -->
    <g id="Layer_Main_Text">
        <text x="50%" y="55%" text-anchor="middle" class="title">
            AURA
        </text>
    </g>

    <!-- ===== LAYER: TAGLINE ===== -->
    <g id="Layer_Tagline">
        <text x="73%" y="68%" text-anchor="middle" class="subtitle">
            BY KINJAL SHARMA
        </text>
    </g>

</svg>